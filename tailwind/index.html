<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href='https://cdn.boxicons.com/fonts/basic/boxicons.min.css' rel='stylesheet'>
</head>
<body class="font-[verdana] flex justify-center items-center h-screen bg-[url('https://images.pexels.com/photos/247600/pexels-photo-247600.jpeg')] bg-cover bg-center bg-no-repeat">
    <div class="w-96 h-50 py-10 px-6 bg-transparent rounded-[20px] shadow-[0_0_10px_2px_rgba(255,255,255,0.2)] backdrop-blur-[5px]">
        <h1 class="text-3xl text-center font-bold font-mono text-black-900">login</h1>
        <div class="flex flex-col gap-5 mt-4 mb-6">
            <input class="w-full h-9 color-black pl-4 py-2 bg-transparent text-[14px] text-black-900 border border-white rounded-full outline-none placeholder-white" type="text" placeholder="Username" required>
                <i class="bxr  bxs-user bx-flip-vertical absolute right-9 text-white mt-3 pr-2"></i>
        </div>
        <div class="flex flex-col gap-5 mb-6">
            <input class="w-full h-9 color-black pl-4 py-2 bg-transparent text-[14px] text-black-900 border border-white rounded-full outline-none placeholder-white" type="password" placeholder="Password" required>
                <i class='bxr bxs-lock-keyhole absolute right-9 text-white mt-3 pr-2'></i>
        </div>
        <div class="flex justify-between mb-4 text-white text-[13px]">
            <label class="text-black"><input type="checkbox">Remember Me</label>
            <a href="#" class=" hover:text-black hover:underline">Forgot Password?</a>
        </div>
        <button class="w-full h-9 text-center bg-white font-bold rounded-full hover:bg-blue-900 hover:text-white"type="submit">Login</button><br/>
        <div class="flex justify-center mt-4 text-white">
            <p class="text-black">Don't have an account?</p> <a class="ml-2 hover:text-black hover:underline"href="#">Sign Up</a>
        </div>
    </div>
</body>
</html>
